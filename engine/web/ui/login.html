<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>로그인 · backup-stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand"><span class="mark"></span><b>backup<span>·</span>stack</b></div>
      <div class="sub">RESTIC · RCLONE · GOOGLE DRIVE</div>
      <label for="u">아이디</label>
      <input id="u" placeholder="admin" autocomplete="username">
      <label for="p">비밀번호</label>
      <input id="p" type="password" placeholder="••••••••" autocomplete="current-password">
      <button id="loginBtn" class="btn-primary">로그인</button>
      <div id="loginErr" class="err"></div>
    </div>
  </div>
</div>
<script src="/login.js"></script>
</body>
</html>
